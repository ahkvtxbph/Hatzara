
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>טופס הצהרה - חתימה משולבת</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            direction: rtl;
        }
        .form-container {
            max-width: 750px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #34495e;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #34495e;
        }
        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .flex-row {
            display: flex;
            gap: 20px;
        }
        .flex-row > div {
            flex: 1;
        }
        .declaration {
            background-color: #f9f9f9;
            padding: 15px;
            border-right: 5px solid #34495e;
            margin: 20px 0;
            font-style: italic;
            font-size: 0.95em;
        }
        .signature-section {
            margin-top: 20px;
            border: 1px solid #eee;
            padding: 20px;
            border-radius: 8px;
            background-color: #fcfcfc;
        }
        .sig-tabs {
            display: flex;
            margin-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }
        .sig-tab {
            padding: 10px 20px;
            cursor: pointer;
            border: 1px solid transparent;
            border-bottom: none;
            background: #eee;
        }
        .sig-tab.active {
            background: #fff;
            border-color: #ddd;
            font-weight: bold;
        }
        .sig-content {
            display: none;
            text-align: center;
        }
        .sig-content.active {
            display: block;
        }
        canvas {
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
            cursor: crosshair;
            touch-action: none;
            max-width: 100%;
        }
        #signature-preview {
            max-width: 300px;
            max-height: 150px;
            margin-top: 10px;
            display: none;
            border: 1px solid #eee;
            margin-left: auto;
            margin-right: auto;
        }
        .summary-box {
            background-color: #e8f4fd;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-weight: bold;
            color: #2980b9;
        }
        .btn-container {
            text-align: center;
            margin-top: 30px;
        }
        button {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button.clear-btn { background-color: #e74c3c; }
        @media print {
            .btn-container, .instructions, .no-print, .sig-tabs, .canvas-controls, input[type="file"] { display: none !important; }
            body { background: white; padding: 0; }
            .form-container { box-shadow: none; border: 1px solid #eee; width: 100%; max-width: 100%; }
            input, textarea { border: none; border-bottom: 1px dotted #000; }
            .sig-content { display: none !important; }
            .sig-content.active { display: block !important; }
            canvas, #signature-preview { border: none; margin: 0 auto; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h1>טופס הצהרה על היעדרות</h1>
    <p class="instructions no-print">מלאו את הפרטים ובחרו בדרך החתימה הנוחה לכם.</p>

    <div class="form-group">
        <label>שם מלא:</label>
        <input type="text" id="name">
    </div>

    <div class="flex-row">
        <div class="form-group">
            <label>מספר עובד:</label>
            <input type="text" id="empId">
        </div>
        <div class="form-group">
            <label>מחלקה:</label>
            <input type="text" id="dept">
        </div>
    </div>

    <div class="form-group">
        <label>תקופת ההיעדרות:</label>
        <div class="flex-row">
            <div>
                <label style="font-size: 0.8em;">מתאריך:</label>
                <input type="date" id="startDate" onchange="calculateDays()">
            </div>
            <div>
                <label style="font-size: 0.8em;">עד תאריך:</label>
                <input type="date" id="endDate" onchange="calculateDays()">
            </div>
        </div>
        <div id="daysResult" class="summary-box">סה"כ ימים: נא לבחור תאריכים</div>
    </div>

    <div class="declaration">
        אני מצהיר/ה כי נעדרתי מעבודתי בתאריכים הנקובים לעיל עקב מחלה. ידוע לי כי הצהרה זו מחליפה אישור רפואי במסגרת מכסת ימי ההצהרה השנתיים.
    </div>

    <div class="signature-section">
        <label>חתימת העובד/ת:</label>
        <div class="sig-tabs no-print">
            <div class="sig-tab active" onclick="switchTab('draw')">חתימה ידנית</div>
            <div class="sig-tab" onclick="switchTab('upload')">העלאת קובץ</div>
        </div>

        <div id="draw-content" class="sig-content active">
            <canvas id="signature-pad" width="450" height="150"></canvas>
            <div class="canvas-controls no-print">
                <button class="clear-btn" onclick="clearCanvas()">נקה חתימה</button>
            </div>
        </div>

        <div id="upload-content" class="sig-content">
            <input type="file" id="sigInput" accept="image/*" onchange="previewSignature(event)">
            <br>
            <img id="signature-preview" src="" alt="תצוגה מקדימה">
        </div>
    </div>

    <div class="btn-container">
        <button onclick="window.print()">הורדה כ-PDF / הדפסה</button>
    </div>
</div>

<script>
    // לוגיקה של הטאבים
    function switchTab(tab) {
        document.querySelectorAll('.sig-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.sig-content').forEach(c => c.classList.remove('active'));
        
        if(tab === 'draw') {
            document.querySelector('.sig-tab:nth-child(1)').classList.add('active');
            document.getElementById('draw-content').classList.add('active');
        } else {
            document.querySelector('.sig-tab:nth-child(2)').classList.add('active');
            document.getElementById('upload-content').classList.add('active');
        }
    }

    // לוגיקת החתימה ביד
    const canvas = document.getElementById('signature-pad');
    const ctx = canvas.getContext('2d');
    let writing = false;
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        return { x: clientX - rect.left, y: clientY - rect.top };
    }
    function start(e) { writing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
    function draw(e) { if (!writing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); e.preventDefault(); }
    function stop() { writing = false; }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stop);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stop);

    function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    // העלאת תמונה
    function previewSignature(event) {
        const reader = new FileReader();
        reader.onload = function() {
            const output = document.getElementById('signature-preview');
            output.src = reader.result;
            output.style.display = 'block';
        };
        if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
    }

    // חישוב ימים
    function calculateDays() {
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const resultBox = document.getElementById('daysResult');
        if (!start) return;
        const d1 = new Date(start);
        const d2 = end ? new Date(end) : d1;
        const diffDays = Math.ceil((d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
        resultBox.innerText = 'סה"כ ימי הצהרה: ' + (diffDays === 2 ? 'יומיים (2)' : diffDays + ' ימים');
    }
</script>

</body>
</html>
